# ─────────────────────────────────────────────────────────────────
# CI — build and test on every push/PR
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Verify build
        run: |
          if [ ! -f "src/DebugAgent/bin/Release/net8.0/DebugAgent.dll" ]; then
            echo "ERROR: DebugAgent.dll not found"
            exit 1
          fi
          echo "OK: DebugAgent.dll built successfully"
