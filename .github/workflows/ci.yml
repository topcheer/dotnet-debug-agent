# ─────────────────────────────────────────────────────────────────
# CI — build and test on every push/PR
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build
        run: dotnet build src/DebugAgent/DebugAgent.csproj --configuration Release

      - name: Verify build
        run: |
          for tfm in net8.0 net9.0 net10.0; do
            if [ ! -f "src/DebugAgent/bin/Release/${tfm}/DebugAgent.dll" ]; then
              echo "ERROR: DebugAgent.dll not found for ${tfm}"
              exit 1
            fi
            echo "OK: DebugAgent.dll built for ${tfm}"
          done
